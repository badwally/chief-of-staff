name: morning-briefing
description: "Daily operational review: time, calendar, tasks, goals, inbox."
trigger: manual
context:
  policies: [goal-referencing, decision-posture, context-discipline]
  memory_scopes: [global]
  indexes: [recent, entities]

steps:
  - name: get-time
    executor: mcp
    tool: google-calendar.get-time
    optional: true
    fallback: "Use system time from environment if MCP unavailable"
    output:
      type: timestamp
      key: current_time

  - name: review-calendar
    executor: prompt
    prompt: |
      Review today's calendar events. Flag conflicts, back-to-back meetings
      without breaks, and hard-constraint violations (per identity.yaml).
    input:
      current_time: ${get-time.current_time}
    reads: [state/config/identity.yaml]
    output:
      type: structured
      schema: calendar-review
      key: calendar

  - name: review-tasks
    executor: prompt
    prompt: |
      Review tasks for overdue, due-today, and approaching items.
      Cross-reference against calendar for execution windows.
    input:
      calendar: ${review-calendar.calendar}
    reads: [state/domain/tasks.yaml]
    output:
      type: structured
      schema: task-review
      key: tasks

  - name: check-goals
    executor: prompt
    prompt: |
      Assess goal status. Identify stalled goals, check calendar-goal alignment.
      Flag if today's calendar serves no active goal.
    input:
      calendar: ${review-calendar.calendar}
      tasks: ${review-tasks.tasks}
    reads: [state/domain/goals.yaml]
    output:
      type: structured
      schema: goal-review
      key: goals

  - name: scan-inbox
    executor: prompt
    optional: true
    fallback: "Skip inbox section if Gmail MCP unavailable"
    prompt: |
      Quick scan of last 12 hours of email for Tier 1 items only.
      Do not draft replies; flag items that need attention.
    input:
      current_time: ${get-time.current_time}
    reads: [state/config/tiers.yaml]
    tools: [gmail.search]
    output:
      type: structured
      schema: inbox-scan
      key: inbox

  - name: review-newsletters
    executor: prompt
    optional: true
    fallback: "Skip newsletters if Gmail unavailable"
    prompt: |
      Quick scan of Substack newsletters from the last 24 hours.
      Query: from:substack.com newer_than:1d

      For each message, extract: publication name, headline, 1-line summary,
      message_id, and received timestamp. Skip billing/account emails.
      Group by topic (4-6 broad labels).

      Keep this lightweight — headline-level scan only, no deep summaries.

      After scanning, write the digest to the Obsidian vault:
      File path: /Users/andrewgrant/obsidian/Substack/{YYYY-MM-DD}.md
      Format: YAML frontmatter (date, total_count, tags: [substack, digest]),
      topic-grouped headlines with [[wikilinked]] publication names.
      If the file already exists, overwrite it.
    tools: [gmail.search]
    output:
      type: structured
      schema: newsletter-digest
      key: newsletters

  - name: synthesize-briefing
    executor: prompt
    prompt: |
      Synthesize all inputs into a single-screen morning briefing.
      Lead with the top 1-3 focus items for the day.
      Include: calendar summary, critical tasks, goal status, urgent inbox items.
      If newsletters are available, add a "Reading Queue" section with the top
      3-4 goal-relevant headlines from Substack newsletters.
      End with a focus recommendation.
      If optional inputs (time, inbox, newsletters) are unavailable, omit those sections gracefully.
    input:
      calendar: ${review-calendar.calendar}
      tasks: ${review-tasks.tasks}
      goals: ${check-goals.goals}
      inbox: ${scan-inbox.inbox}
      newsletters: ${review-newsletters.newsletters}
    output:
      type: text
      key: briefing
    gate: display
