# TEMPLATE — Copy to tools.yaml and enable your integrations
# Created by the setup workflow; do not edit this template directly.

# MCP Server & Integration Declarations (E1-E8)
# All disabled until MCP servers are configured

integrations:
  gmail:
    type: mcp
    server: gmail
    enabled: false

  google_calendar:
    type: mcp
    server: google-calendar
    enabled: false

  slack:
    type: mcp
    server: slack
    enabled: false

  linear:
    type: mcp
    server: linear
    enabled: false

  notion:
    type: mcp
    server: notion
    enabled: false

  firecrawl:
    type: mcp
    server: firecrawl
    enabled: false

  github:
    type: mcp
    server: github
    enabled: false

  gemini_vision:
    type: custom
    path: mcp/gemini-vision
    enabled: false

  voicemode:
    type: mcp
    server: voicemode
    enabled: false
    notes: "Voice input (Whisper STT) and output (Kokoro/OpenAI TTS). Install plugin first: claude plugin marketplace add mbailey/voicemode"

  mcp_tts:
    type: mcp
    server: mcp-tts
    enabled: false
    notes: "Multi-backend TTS (macOS say, ElevenLabs, Google, OpenAI). Install: go install github.com/blacktop/mcp-tts@latest"
